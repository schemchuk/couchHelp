    - generic [ref=e723]:
      - heading "DNS Propagation Checker - How to Check DNS Propagation Globally?" [level=2] [ref=e724]
      - paragraph [ref=e725]: Perform a quick DNS propagation lookup for any domain. Our DNS Propagation Test tool features a comprehensive list of 100+ global DNS servers, which makes global DNS checks more effortless than ever. It is designed to collect, parse, and display all the DNS propagation results on the map, going beyond text-based propagation reports.
      - paragraph [ref=e726]: It visually represents how your DNS changes are propagated across different DNS servers in different regions globally. This enhances your understanding and makes identifying any regional variations or issues easier. Now monitor and manage your DNS records effectively.
      - paragraph [ref=e727]: "Here’s how you can use our tool for performing a free DNS Propagation Test online:"
      - heading "Enter The Domain or Hostname" [level=3] [ref=e728]
      - paragraph [ref=e729]: Get started by providing the website domain name for which you want to carry out a DNS propagation test.
      - heading "Select DNS Record for Propagation Status Check" [level=3] [ref=e730]
      - paragraph [ref=e731]: "Select the DNS record whose propagation status you would like to check. Click on the drop-down menu right next to the search bar and choose any of the following records:"
      - list [ref=e732]:
        - listitem [ref=e733]:
          - strong [ref=e734]: A record
          - text: ": contains the IPv4 address info of the hostname."
        - listitem [ref=e735]:
          - strong [ref=e736]: "AAAA record:"
          - text: contains the IPv6 address info of the hostname.
        - listitem [ref=e737]:
          - strong [ref=e738]: CNAME record
          - text: ": also known as alias record. It points the sub-domain to its domain, like pointing www.dnschecker.org to dnschecker.org. Get comprehensive insights about the domain’s CNAME records with"
          - link "CNAME record lookup" [ref=e739] [cursor=pointer]:
            - /url: https://dnschecker.org/cname-lookup.php
          - text: .
        - listitem [ref=e740]:
          - strong [ref=e741]: MX record
          - text: ": contains the info where the domain's email should be routed to and mail servers priority."
          - link "Lookup MX record" [ref=e742] [cursor=pointer]:
            - /url: https://dnschecker.org/mx-lookup.php
          - text: for more info about the domain’s MX records.
        - listitem [ref=e743]:
          - strong [ref=e744]: NS record
          - text: ": contains information about the authoritative nameservers of a domain."
          - link "NS Checker" [ref=e745] [cursor=pointer]:
            - /url: https://dnschecker.org/ns-lookup.php
          - text: will provide you with all the name servers associated with a domain.
        - listitem [ref=e746]:
          - strong [ref=e747]: PTR record
          - text: ": used in"
          - link "reverse IP lookup" [ref=e748] [cursor=pointer]:
            - /url: https://dnschecker.org/reverse-dns.php
          - text: to map an IP address to a domain name, allowing the identification of the host associated with a particular IP address.
        - listitem [ref=e749]:
          - strong [ref=e750]: SRV record
          - text: ": specifies the location and configuration of a particular service, such as email or voice over IP (VoIP), allowing clients to discover and connect to the appropriate server."
        - listitem [ref=e751]:
          - strong [ref=e752]: SOA record
          - text: ": the start of authority is responsible for holding and specifying information about the DNS zone."
        - listitem [ref=e753]:
          - strong [ref=e754]: TXT record
          - text: ": is commonly used for other DNS records configurations like"
          - link "SPF" [ref=e755] [cursor=pointer]:
            - /url: https://dnschecker.org/spf-record-validation.php
          - text: ","
          - link "DKIM" [ref=e756] [cursor=pointer]:
            - /url: https://dnschecker.org/dkim-record-checker.php
          - text: ", or"
          - link "DMARC records" [ref=e757] [cursor=pointer]:
            - /url: https://dnschecker.org/dmarc-record-generator.php
          - text: .
        - listitem [ref=e758]:
          - strong [ref=e759]: "CAA record:"
          - text: used to assist in SSL validation by highlighting which authorities can issue certificates for a domain.
        - listitem [ref=e760]:
          - strong [ref=e761]: "DS record:"
          - text: acts as a delegation signer, maintaining a chain of trust between the parent zone and child zone. Use the
          - link "DS record Lookup" [ref=e762] [cursor=pointer]:
            - /url: https://dnschecker.org/ds-lookup.php
          - text: tool to dig deeper.
        - listitem [ref=e763]:
          - strong [ref=e764]: "DNSKEY record:"
          - text: contains the public signing keys like Zone Signing Key (ZSK) and Key Signing Key (KSK). Check the
          - link "DNSKEY record" [ref=e765] [cursor=pointer]:
            - /url: https://dnschecker.org/dnskey-lookup.php
          - text: for more info.
      - heading "Perform Quick DNS Propagation" [level=3] [ref=e766]
      - paragraph [ref=e767]: Once everything is set, click “Search” to run our DNS propagation check tool. It will take a moment to display the results, highlighting all server locations with their respective propagation statuses.
      - paragraph [ref=e768]: "Here are a few things to keep in mind while checking DNS propagation status:"
      - list [ref=e769]:
        - listitem [ref=e770]: ✔️ indicates that the DNS records have been propagated.
        - listitem [ref=e771]: ❌ shows that the DNS records haven’t been propagated.
      - paragraph [ref=e772]: More clearly - the green tick shows that the requested DNS record is available in the DNS server, and the cross shows that it is not. The green tick may also mean that the DNS record matches the updated value that the user has set in the expected value field. In contrast, the cross may denote that the value does not match the expected or updated value (the user expects it to be).
      - heading "How to Add a Custom DNS Server?" [level=3] [ref=e773]
      - paragraph [ref=e774]: "If you want to add a DNS Server, do it easily with our tool. Simply click on the “+” button and enter the following information:"
      - list [ref=e775]:
        - listitem [ref=e776]: DNS Name
        - listitem [ref=e777]: DNS IP
        - listitem [ref=e778]: DNS Provider
        - listitem [ref=e779]: DNS Map Latitude
        - listitem [ref=e780]: DNS Map Longitude
      - paragraph [ref=e781]: The DNS Name and DNS IP address are compulsory to specify, or else it will not work.
      - paragraph [ref=e782]: Our tool will also allow you to add the custom DNS server to the public DNS list as required.
      - heading "How to Add Expected Value of IP Address?" [level=3] [ref=e783]
      - paragraph [ref=e784]: If your IP Address has been changed now, then leverage the smart controls to specify the expected value of the new IP address by highlighting its “regular expressions,” “containing numbers,” or “exact match number.”
      - heading "Here's What Else You Can Do…" [level=3] [ref=e785]
      - paragraph [ref=e786]: "If required, you can go to the “DNS Lists” section to leverage our tool’s smart search capabilities. It will enable you to check the DNS propagation status of your website with respect to a specific:"
      - list [ref=e787]:
        - listitem [ref=e788]: IP Address
        - listitem [ref=e789]: Continent
        - listitem [ref=e790]: Country
      - paragraph [ref=e791]: Simply click on the respective IP address type, continent name, or country name (server location). Our DNS status checker will reload, allowing you to enter the hostname or IP and validate its propagation status accordingly.
      - paragraph [ref=e792]: Let’s say you would like to check the DNS propagation status of a website in Asia (continent). Click on it and then proceed as guided earlier. It will show you whether the given hostname DNS has been propagated in the Asia continent or not. The same goes for IPv4, IPv6, and all countries worldwide.
      - heading "Frequently Asked Questions" [level=2] [ref=e793]
      - paragraph [ref=e794]: Here’s the insider scope you need to know all about DNS!
      - heading "What is Domain Name System?" [level=3] [ref=e795]
      - paragraph [ref=e796]: Domain Name System (DNS) is a hierarchical decentralized system that maps domain names to IP addresses. It is the internet's equivalent of a phone book, mapping human-readable domain names to IP addresses.
      - heading "What is DNS resolution?" [level=3] [ref=e797]
      - paragraph [ref=e798]:
        - text: DNS resolution translates the domain name into its server IP address. You need a
        - link "site's IP address" [ref=e799] [cursor=pointer]:
          - /url: https://dnschecker.org/domain-ip-lookup.php
        - text: to know where it’s on the Internet.
      - paragraph [ref=e800]: The four DNS Servers work together (in a chain) to convert a domain name to its IP address, enabling the requested web resource to load on the user screen.
      - paragraph [ref=e801]: "Here is how the DNS resolution process works:"
      - list [ref=e802]:
        - listitem [ref=e803]:
          - strong [ref=e804]: "Recursive DNS server (DNS resolver):"
          - text: These servers are the first in the DNS check process. Receive DNS queries from clients and resolve the human-readable domain name to an IP address. That server tracks the IP address for the searched domain or hostname.
        - listitem [ref=e805]:
          - strong [ref=e806]: "Root DNS servers:"
          - text: These servers are at the top of the DNS hierarchy and provide a list of top-level domain (TLD) servers to resolvers.
        - listitem [ref=e807]:
          - strong [ref=e808]: TLD Name Servers
          - text: ": These servers return the authoritative name servers for each domain. These are responsible for handling the requests for specific top-level domains like .com, org, etc. The .com TLD name servers will return results for abc.com but not abc.org."
        - listitem [ref=e809]:
          - strong [ref=e810]: "Authoritative DNS servers:"
          - text: These servers are the last stop in the DNS resolution process. The authoritative nameservers for the searched domain hold the actual DNS records and respond to queries with the correct IP addresses.
      - heading "How does the DNS process work?" [level=3] [ref=e811]
      - paragraph [ref=e812]: "Suppose you request to open the URL https://xyz.com in your web browser's bar. Here’s how it works:"
      - list [ref=e813]:
        - listitem [ref=e814]: Your browser sends a DNS query to a DNS resolver (recursive Server), usually provided by your Internet Service Provider (ISP).
        - listitem [ref=e815]: The recursive resolver checks its cache to see if it already has the requested DNS information for the domain name. If it does, it returns to your computer, and the process ends.
        - listitem [ref=e816]: If the recursive resolver doesn't have the DNS information in its cache, it sends a query to the root DNS servers. These servers maintain a database of all the top-level domain names, such as .com, .org, .net, etc.
        - listitem [ref=e817]: The recursive resolver then contacts the root DNS servers that respond to the query with the IP of appropriate TLD (Top-Level Domain) DNS servers.
        - listitem [ref=e818]: The TLD DNS servers respond to the query by referring to the authoritative DNS servers for the domain name. These servers are responsible for maintaining the DNS records for the domain.
        - listitem [ref=e819]: The authoritative DNS servers respond to the query with the requested DNS records for the domain name.
        - listitem [ref=e820]: The DNS resolver caches the updated/latest fetched DNS records and returns them to your computer, which can now be used for whatever purpose those records were requested.
      - heading "What is DNS propagation?" [level=3] [ref=e821]
      - paragraph [ref=e822]:
        - text: DNS propagation is the time DNS changes take to be updated across the internet over the globe. It can take up to 48 hours to propagate worldwide. Use our
        - link "Global DNS Propagation Checker" [ref=e823] [cursor=pointer]:
          - /url: https://dnschecker.org/
        - text: for free to get a quick report on your DNS propagation status.
      - heading "How do DNS records propagate?" [level=3] [ref=e824]
      - paragraph [ref=e825]: When you update your DNS records, the changes may take up to 48 hours. During this period, ISPs worldwide update their DNS cache with new DNS information for your domain.
      - paragraph [ref=e826]:
        - text: However, DNS records may take some time to propagate due to different DNS cache levels. Thus, some visitors might be directed to the old server’s IP until the DNS propagation process finishes worldwide. However, most visitors see updated DNS records shortly after they change. You can look up A, AAAA, CNAME, and additional DNS records lookup from our
        - link "DNS lookup" [ref=e827] [cursor=pointer]:
          - /url: https://dnschecker.org/all-dns-records-of-domain.php
        - text: tool.
      - heading "Why DNS propagation takes time?" [level=3] [ref=e828]
      - paragraph [ref=e829]: Suppose you changed your domain's nameservers and requested to open your domain on the web browser. Your request will not go to the hosting directly. Each ISP node first checks its DNS cache, whether it has the DNS information for that domain. If it is not there, it will look it up by fetching DNS information from the authoritative DNS server of the domain to serve the user’s request. It also saves that info for future use to speed up the DNS lookup process. Thus, the new nameservers will not propagate instantly. ISPs have different cache refreshing levels resulting in some still having the old DNS information in their cache.
      - heading "Why is DNS not propagating?" [level=3] [ref=e830]
      - paragraph [ref=e831]: The ISPs across the world have different caching levels. The DNS client or the server may cache the information of the DNS records in its DNS cache. That information is temporarily cached, and DNS servers will go for the updated DNS information when TTL (Time to Live) expires.
      - paragraph [ref=e832]:
        - strong [ref=e833]: "Note:"
        - text: If your new DNS changes are still not reflecting, you can go for a
        - link "DNS health check" [ref=e834] [cursor=pointer]:
          - /url: https://dnschecker.org/domain-health-checker.php
        - text: to ensure that your DNS changes are up to the mark and following the standards. You can also
        - link "flush your DNS cache" [ref=e835] [cursor=pointer]:
          - /url: https://dnschecker.org/flush-dns.php
        - text: .
      - heading "What will happen if the domain name does not exist?" [level=3] [ref=e836]
      - paragraph [ref=e837]: The DNS server will return a name error, also known as an NXDomain response (for a non-existent domain), to symbolize that the query's domain name does not exist.
      - heading "What is the port used by DNS?" [level=3] [ref=e838]
      - paragraph [ref=e839]: DNS uses both TCP and UDP port 53. However, the most frequently used port for DNS is UDP 53. That is used when the client's computer communicates with the DNS server to resolve the domain name. When using the UDP 53 for DNS, the maximum size of the query packet is 512 bytes.
      - paragraph [ref=e840]:
        - text: TCP 53 is used primarily for Zone Transfers and when the query packet exceeds 512 bytes. That is true when DNSSEC is used, which adds extra overhead to the DNS query packet. You can test all the server ports using a
        - link "port scanner online" [ref=e841] [cursor=pointer]:
          - /url: https://dnschecker.org/port-scanner.php
        - text: .
      - heading "What is DNS failure?" [level=3] [ref=e842]
      - paragraph [ref=e843]: DNS failure means that the DNS server cannot convert the domain name into an IP address in a TCP/IP network. That failure may occur within the company's private network or the internet.
